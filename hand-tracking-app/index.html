<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Vision Interface</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load Futuristic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Load MediaPipe Tasks Vision from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>MARK XLVII HUD</h1>
        <p>STARK INDUSTRIES // AWAITING SENSOR INPUT</p>
        
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
            <div class="scanline"></div>
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <p>LOADING J.A.R.V.I.S. PROTOCOLS...</p>
            </div>
        </div>

        <button id="enableWebcamButton" class="mdc-button mdc-button--raised">
            <span class="mdc-button__label">ENGAGE TARGETING</span>
        </button>
    </div>

    <!-- Our inline logic -->
    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // Get references to elements
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const enableWebcamButton = document.getElementById("enableWebcamButton");
        const loadingOverlay = document.getElementById("loading");

        let handLandmarker = undefined;
        let runningMode = "VIDEO";
        let webcamRunning = false;
        let lastVideoTime = -1;

        // Initialize drawing utility
        const drawingUtils = new DrawingUtils(canvasCtx);

        // Create HandLandmarker instance
        const createHandLandmarker = async () => {
            try {
                const visionFileset = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(visionFileset, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: runningMode,
                    numHands: 2
                });
                loadingOverlay.classList.add("hidden");
            } catch (error) {
                console.error("Error loading HandLandmarker:", error);
                loadingOverlay.innerHTML = "<p>FATAL ERROR // REBOOT SYSTEM</p>";
            }
        };

        await createHandLandmarker();

        // Check if webcam access is supported
        const hasGetUserMedia = () => !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

        if (hasGetUserMedia()) {
            enableWebcamButton.addEventListener("click", enableCam);
        } else {
            console.warn("getUserMedia() is not supported by your browser");
            enableWebcamButton.innerHTML = "SENSORS DAMAGED";
        }

        // Enable webcam function
        function enableCam(event) {
            if (!handLandmarker) {
                console.log("Wait! objectDetector not loaded yet.");
                return;
            }

            if (webcamRunning === true) {
                webcamRunning = false;
                enableWebcamButton.innerText = "ENGAGE TARGETING";
            } else {
                webcamRunning = true;
                enableWebcamButton.innerText = "DISENGAGE SENSORS";
            }

            const constraints = {
                video: { facingMode: "user" }
            };

            navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            }).catch((err) => {
                console.error("Error accessing webcam:", err);
                alert("ACCESS DENIED // CHECK PRIVACY PROTOCOLS");
            });
        }

        let rotationAngle = 0;

        // Predict webcam loop
        async function predictWebcam() {
            if (canvasElement.width !== video.videoWidth) {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
            }

            let startTimeMs = performance.now();
            
            // Clear canvas for high-performance rendering
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                if (results.landmarks) {
                    rotationAngle += 0.05; // Rotate the HUD

                    for (const landmarks of results.landmarks) {
                        
                        // 1. Draw sleek rigid robotic lines (Super Fast, No Shadow Blur)
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, {
                            color: "#00f3ff",
                            lineWidth: 3
                        });

                        drawingUtils.drawLandmarks(landmarks, { 
                            color: "#ffd700", 
                            lineWidth: 1,
                            radius: 3 
                        });

                        // 2. Calculate Palm Center (Landmark 9 is middle finger base)
                        const palmBase = landmarks[0];
                        const middleBase = landmarks[9];
                        
                        const centerX = ((palmBase.x + middleBase.x) / 2) * canvasElement.width;
                        const centerY = ((palmBase.y + middleBase.y) / 2) * canvasElement.height;

                        // 3. Draw Iron Man Repulsor HUD (Highly Optimized)
                        canvasCtx.save();
                        canvasCtx.translate(centerX, centerY);
                        
                        // Outer rotating dashed ring
                        canvasCtx.rotate(rotationAngle);
                        canvasCtx.beginPath();
                        canvasCtx.arc(0, 0, 45, 0, Math.PI * 2);
                        canvasCtx.strokeStyle = "#00f3ff";
                        canvasCtx.lineWidth = 2;
                        canvasCtx.setLineDash([10, 10]);
                        canvasCtx.stroke();
                        
                        // Inner counter-rotating ring
                        canvasCtx.rotate(-rotationAngle * 2);
                        canvasCtx.beginPath();
                        canvasCtx.arc(0, 0, 30, 0, Math.PI * 2);
                        canvasCtx.strokeStyle = "#ffd700";
                        canvasCtx.lineWidth = 4;
                        canvasCtx.setLineDash([20, 5]);
                        canvasCtx.stroke();

                        // Core Solid Ring
                        canvasCtx.setLineDash([]);
                        canvasCtx.beginPath();
                        canvasCtx.arc(0, 0, 15, 0, Math.PI * 2);
                        canvasCtx.fillStyle = "rgba(0, 243, 255, 0.4)";
                        canvasCtx.fill();
                        canvasCtx.strokeStyle = "#00f3ff";
                        canvasCtx.lineWidth = 2;
                        canvasCtx.stroke();

                        canvasCtx.restore();
                    }
                }
            }

            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }
    </script>
</body>
</html>
