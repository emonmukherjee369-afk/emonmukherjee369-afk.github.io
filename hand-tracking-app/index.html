<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Hand Tracking</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load Futuristic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Load MediaPipe Tasks Vision from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>Hand Tracking Interface</h1>
        <p>SYSTEM READY // AWAITING CAMERA FEED</p>
        
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
            <div class="scanline"></div>
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <p>INITIALIZING NEURAL NET...</p>
            </div>
        </div>

        <button id="enableWebcamButton" class="mdc-button mdc-button--raised">
            <span class="mdc-button__label">INITIATE SENSOR</span>
        </button>
    </div>

    <!-- Our inline logic -->
    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // Get references to elements
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const enableWebcamButton = document.getElementById("enableWebcamButton");
        const loadingOverlay = document.getElementById("loading");

        let handLandmarker = undefined;
        let runningMode = "VIDEO";
        let webcamRunning = false;
        let lastVideoTime = -1;

        // VFX: Particle Physics System
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                // Explosive random velocity
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.life = 1.0;     // 1.0 to 0.0
                this.decay = Math.random() * 0.02 + 0.015; // fade rate
                this.size = Math.random() * 6 + 3;
            }

            update() {
                // Apply drag/friction
                this.vx *= 0.95;
                this.vy *= 0.95;
                
                // Add slight upward drift (anti-gravity energy effect)
                this.vy -= 0.1;
                
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        class ParticleSystem {
            constructor() {
                this.particles = [];
            }

            emit(x, y, color, count = 3) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }

            updateAndDraw(ctx) {
                // Use additive blending for super bright glowing fire/plasma effects
                ctx.globalCompositeOperation = 'lighter';
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.update();
                    p.draw(ctx);
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
                
                // Reset blend mode for anything else drawn
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        const vfx = new ParticleSystem();

        // Create HandLandmarker instance
        const createHandLandmarker = async () => {
            try {
                const visionFileset = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(visionFileset, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: runningMode,
                    numHands: 2
                });
                loadingOverlay.classList.add("hidden");
            } catch (error) {
                console.error("Error loading HandLandmarker:", error);
                loadingOverlay.innerHTML = "<p>ERROR DETECTED // RELOAD INTERFACE</p>";
            }
        };

        await createHandLandmarker();

        // Check if webcam access is supported
        const hasGetUserMedia = () => !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

        if (hasGetUserMedia()) {
            enableWebcamButton.addEventListener("click", enableCam);
        } else {
            console.warn("getUserMedia() is not supported by your browser");
            enableWebcamButton.innerHTML = "SENSOR OFFLINE";
        }

        // Enable webcam function
        function enableCam(event) {
            if (!handLandmarker) {
                console.log("Wait! objectDetector not loaded yet.");
                return;
            }

            if (webcamRunning === true) {
                webcamRunning = false;
                enableWebcamButton.innerText = "INITIATE SENSOR";
            } else {
                webcamRunning = true;
                enableWebcamButton.innerText = "HALT SENSOR";
            }

            const constraints = {
                video: { facingMode: "user" }
            };

            navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            }).catch((err) => {
                console.error("Error accessing webcam:", err);
                alert("SENSOR ACCESS DENIED // CHECK PERMISSIONS");
            });
        }

        // Predict webcam loop
        async function predictWebcam() {
            if (canvasElement.width !== video.videoWidth) {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
            }

            let startTimeMs = performance.now();
            
            // We want to clear the canvas every frame to draw the particles
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                if (results.landmarks) {
                    for (const landmarks of results.landmarks) {
                        // Fingertip Indices: Thumb=4, Index=8, Middle=12, Ring=16, Pinky=20
                        const fingertips = [4, 8, 12, 16, 20];
                        
                        // Cyberpunk Colors to alternate
                        const colors = ['#05d9e8', '#ff2a6d', '#05d9e8', '#ff2a6d', '#05d9e8'];

                        for (let i = 0; i < fingertips.length; i++) {
                            const tip = landmarks[fingertips[i]];
                            // Convert normalized coordinates (0-1) to pixel coordinates
                            const px = tip.x * canvasElement.width;
                            const py = tip.y * canvasElement.height;
                            
                            // Emit particles from this fingertip!
                            vfx.emit(px, py, colors[i], 3);
                        }
                    }
                }
            }

            // Always update and draw the particles, even if no new ones are spawned
            // This ensures they continue fading/moving after hand leaves frame
            canvasCtx.save();
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = '#05d9e8';
            vfx.updateAndDraw(canvasCtx);
            canvasCtx.restore();

            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }
    </script>
</body>
</html>
