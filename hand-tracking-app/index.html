<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking App</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load MediaPipe Tasks Vision from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>Hand Tracking</h1>
        <p>Ensure your camera is active and bring your hand into view.</p>
        
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <p>Loading Model...</p>
            </div>
        </div>

        <button id="enableWebcamButton" class="mdc-button mdc-button--raised">
            <span class="mdc-button__label">ENABLE WEBCAM</span>
        </button>
    </div>

    <!-- Our inline logic -->
    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // Get references to elements
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const enableWebcamButton = document.getElementById("enableWebcamButton");
        const loadingOverlay = document.getElementById("loading");

        let handLandmarker = undefined;
        let runningMode = "VIDEO";
        let webcamRunning = false;
        let lastVideoTime = -1;

        // Initialize drawing utility
        const drawingUtils = new DrawingUtils(canvasCtx);

        // Create HandLandmarker instance
        const createHandLandmarker = async () => {
            try {
                const visionFileset = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(visionFileset, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: runningMode,
                    numHands: 2
                });
                loadingOverlay.classList.add("hidden");
            } catch (error) {
                console.error("Error loading HandLandmarker:", error);
                loadingOverlay.innerHTML = "<p>Error loading model. Please refresh.</p>";
            }
        };

        await createHandLandmarker();

        // Check if webcam access is supported
        const hasGetUserMedia = () => !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

        if (hasGetUserMedia()) {
            enableWebcamButton.addEventListener("click", enableCam);
        } else {
            console.warn("getUserMedia() is not supported by your browser");
            enableWebcamButton.innerHTML = "Webcam not supported";
        }

        // Enable webcam function
        function enableCam(event) {
            if (!handLandmarker) {
                console.log("Wait! objectDetector not loaded yet.");
                return;
            }

            if (webcamRunning === true) {
                webcamRunning = false;
                enableWebcamButton.innerText = "ENABLE PREDICTIONS";
            } else {
                webcamRunning = true;
                enableWebcamButton.innerText = "DISABLE PREDICTIONS";
            }

            const constraints = {
                video: { width: 640, height: 480 }
            };

            navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            }).catch((err) => {
                console.error("Error accessing webcam:", err);
                alert("Camera access denied or unavailable. Please check your privacy settings.");
            });
        }

        // Predict webcam loop
        async function predictWebcam() {
            if (canvasElement.width !== video.videoWidth) {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
            }

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.landmarks) {
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, {
                            color: "#00FF00",
                            lineWidth: 5
                        });
                        drawingUtils.drawLandmarks(landmarks, { color: "#FF0000", lineWidth: 2 });
                    }
                }
                canvasCtx.restore();
            }

            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }
    </script>
</body>
</html>
